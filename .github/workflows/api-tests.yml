name: API Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de execução"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - stage
          - prod
      test_group:
        description: "Grupo de testes"
        required: true
        default: "functional"
        type: choice
        options:
          - functional
          - contract

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Executar testes
        run: mvn clean test -Dgroups=${{ github.event.inputs.test_group }} -Denv=${{ github.event.inputs.environment }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Gerar Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Publicar Allure Report como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
          retention-days: 7